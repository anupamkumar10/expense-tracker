# Render Blueprint — Smart Expense Tracker
# Docs: https://render.com/docs/blueprint-spec
#
# BEFORE DEPLOY:
# 1. Push this repo to GitHub
# 2. Create a free MongoDB Atlas cluster: https://www.mongodb.com/cloud/atlas
# 3. In Render Dashboard → Blueprint → set MONGODB_URI and ADMIN_EMAIL when prompted
#
# After deploy, your URLs will be:
#   Frontend: https://smart-expense-client.onrender.com
#   API:      https://smart-expense-api.onrender.com

services:
  # ——— Backend API (Node/Express) ———
  - type: web
    name: smart-expense-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      # Paste Atlas connection string in Render dashboard (required)
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      # Email that becomes admin on register/login
      - key: ADMIN_EMAIL
        sync: false
      # Must match your deployed frontend URL (service name → URL)
      - key: CLIENT_ORIGIN
        value: https://smart-expense-client.onrender.com

  # ——— Frontend (React/Vite static site) ———
  - type: web
    name: smart-expense-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Required for React Router (SPA)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://smart-expense-api.onrender.com
